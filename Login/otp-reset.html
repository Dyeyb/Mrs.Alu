<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Code – CAL ELITE</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --gold: #de8908;
            --gold-dim: #c27006;
            --dark: #0e0e0c;
            --surface: #181816;
            --surface2: #202020;
            --text: #e8e4dc;
            --muted: rgba(232, 228, 220, 0.42);
            --border: rgba(222, 137, 8, 0.18);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
        }

        .form-card {
            width: 100%;
            max-width: 400px;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Brand ── */
        .brand {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gold);
        }

        .brand-line {
            width: 40px;
            height: 1px;
            background: var(--gold);
            margin: 0.6rem auto 0;
            opacity: 0.35;
        }

        /* ── Steps ── */
        .steps {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2.5rem;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .step-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--muted);
        }

        .step.active .step-circle {
            background: transparent;
            border-color: var(--gold);
            color: var(--gold);
        }

        .step.done .step-circle {
            background: var(--gold);
            border-color: var(--gold);
            color: var(--dark);
        }

        .step-label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        .step.active .step-label,
        .step.done .step-label {
            color: var(--gold);
        }

        .step-line {
            width: 48px;
            height: 1px;
            background: var(--border);
            margin-bottom: 18px;
        }

        /* ── Header ── */
        .form-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-header .tag {
            font-size: 0.68rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 0.5rem;
            display: block;
            opacity: 0.75;
        }

        .form-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .form-header p {
            font-size: 0.82rem;
            color: var(--muted);
            line-height: 1.65;
            font-weight: 300;
        }

        .email-tag {
            display: inline-block;
            margin-top: 4px;
            color: var(--gold);
            font-weight: 400;
            font-size: 0.82rem;
            background: rgba(222, 137, 8, 0.07);
            padding: 2px 10px;
            border: 1px solid var(--border);
            border-radius: 2px;
        }

        /* ── OTP Inputs ── */
        .otp-row {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.9rem;
        }

        .otp-row input {
            width: 52px;
            height: 60px;
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 600;
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-bottom: 1px solid rgba(222, 137, 8, 0.28);
            color: var(--text);
            outline: none;
            caret-color: var(--gold);
            border-radius: 3px;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s;
        }

        .otp-row input:focus {
            border-color: var(--gold);
            background: var(--surface2);
            box-shadow: 0 0 0 3px rgba(222, 137, 8, 0.07);
            transform: translateY(-2px);
        }

        .otp-row input.filled {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        .otp-row input.error {
            border-color: #e05454;
            box-shadow: 0 0 0 3px rgba(224, 84, 84, 0.08);
            animation: shake 0.4s ease;
        }

        .otp-row input.success {
            border-color: #54b066;
            box-shadow: 0 0 0 3px rgba(84, 176, 102, 0.08);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-5px);
            }

            40% {
                transform: translateX(5px);
            }

            60% {
                transform: translateX(-3px);
            }

            80% {
                transform: translateX(3px);
            }
        }

        /* ── Status ── */
        .status {
            font-size: 0.72rem;
            text-align: center;
            min-height: 1.1rem;
            margin-bottom: 0.5rem;
            transition: opacity 0.2s;
        }

        .status.hidden {
            opacity: 0;
        }

        .status.error {
            color: #e05454;
        }

        .status.warning {
            color: #e09854;
        }

        .status.success {
            color: #54b066;
        }

        /* ── Timer ── */
        .timer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 1.2rem;
        }

        .timer-ring {
            transform: rotate(-90deg);
        }

        .ring-bg {
            stroke: rgba(255, 255, 255, 0.05);
            fill: none;
        }

        .ring-fill {
            fill: none;
            stroke: var(--gold);
            stroke-dasharray: 100;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke 0.3s;
        }

        .ring-fill.low {
            stroke: #e09854;
        }

        .ring-fill.expired {
            stroke: #e05454;
        }

        .timer-text {
            font-size: 0.7rem;
            font-weight: 300;
            color: var(--muted);
        }

        .timer-val {
            color: var(--gold);
            font-weight: 500;
            transition: color 0.3s;
        }

        .timer-val.low {
            color: #e09854;
        }

        .timer-val.expired {
            color: #e05454;
        }

        /* ── Resend ── */
        .resend {
            text-align: center;
            font-size: 0.8rem;
            font-weight: 300;
            color: var(--muted);
            margin-bottom: 1.5rem;
        }

        .resend button {
            background: none;
            border: none;
            border-bottom: 1px solid rgba(222, 137, 8, 0.3);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 400;
            color: var(--gold);
            padding: 0;
            transition: opacity 0.2s;
        }

        .resend button:hover:not(:disabled) {
            opacity: 0.7;
        }

        .resend button:disabled {
            color: var(--muted);
            border-color: transparent;
            cursor: not-allowed;
            opacity: 0.4;
        }

        /* ── Submit ── */
        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 3px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            margin-bottom: 0.85rem;
            transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
        }

        .btn-submit:hover:not(:disabled) {
            background: var(--gold-dim);
            box-shadow: 0 4px 20px rgba(222, 137, 8, 0.3);
        }

        .btn-submit:active {
            transform: scale(0.998);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-label {
            position: relative;
            z-index: 1;
        }

        .btn-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(14, 14, 12, 0.3);
            border-top-color: #0e0e0c;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .btn-submit.loading .btn-label {
            opacity: 0;
        }

        .btn-submit.loading .btn-spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* ── Ghost / Back ── */
        .btn-ghost {
            width: 100%;
            padding: 0.9rem;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 3px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: border-color 0.2s, color 0.2s;
            text-decoration: none;
            display: block;
            text-align: center;
            cursor: pointer;
        }

        .btn-ghost:hover {
            border-color: rgba(222, 137, 8, 0.45);
            color: var(--gold);
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 1.8rem;
            right: 1.8rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: 2px solid var(--gold);
            padding: 0.85rem 1.4rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            color: var(--text);
            border-radius: 3px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            transform: translateX(18px);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 99;
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        @media (max-width: 480px) {
            body {
                padding: 2rem 1.5rem;
            }

            .otp-row input {
                width: 44px;
                height: 52px;
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>

    <div class="form-card">

        <div class="brand">
            <div class="brand-name">Cal Elite</div>
            <div class="brand-line"></div>
        </div>

        <div class="steps">
            <div class="step done">
                <div class="step-circle">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                </div>
                <span class="step-label">Email</span>
            </div>
            <div class="step-line"></div>
            <div class="step active">
                <div class="step-circle">2</div>
                <span class="step-label">Verify</span>
            </div>
            <div class="step-line"></div>
            <div class="step">
                <div class="step-circle">3</div>
                <span class="step-label">Reset</span>
            </div>
        </div>

        <div class="form-header">
            <span class="tag">Password Recovery</span>
            <h2>Check Your Inbox</h2>
            <p>We sent a 6-digit code to<br>
                <span class="email-tag" id="displayEmail">your email</span>
            </p>
        </div>

        <div class="otp-row" id="otpGroup">
            <input type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code" aria-label="Digit 1" />
            <input type="text" maxlength="1" inputmode="numeric" aria-label="Digit 2" />
            <input type="text" maxlength="1" inputmode="numeric" aria-label="Digit 3" />
            <input type="text" maxlength="1" inputmode="numeric" aria-label="Digit 4" />
            <input type="text" maxlength="1" inputmode="numeric" aria-label="Digit 5" />
            <input type="text" maxlength="1" inputmode="numeric" aria-label="Digit 6" />
        </div>

        <div class="status hidden" id="statusMsg"></div>

        <div class="timer">
            <svg class="timer-ring" width="28" height="28" viewBox="0 0 36 36">
                <circle class="ring-bg" cx="18" cy="18" r="15.9" stroke-width="2.8" />
                <circle class="ring-fill" cx="18" cy="18" r="15.9" stroke-width="2.8" id="timerRing" />
            </svg>
            <span class="timer-text">Expires in <span class="timer-val" id="timerVal">10:00</span></span>
        </div>

        <div class="resend">
            Didn't receive it?&nbsp;
            <button id="resendBtn" disabled>
                Resend <span id="resendCd">(wait <span id="resendSec">30</span>s)</span>
            </button>
        </div>

        <button class="btn-submit" id="verifyBtn">
            <span class="btn-label">Verify Code</span>
            <div class="btn-spinner"></div>
        </button>
        <a href="forgot-password.html" class="btn-ghost">← Back</a>

    </div>

    <div class="toast" id="toast"></div>

    <script>
        let resetData = {};
        try { resetData = JSON.parse(sessionStorage.getItem('reset_user') || '{}'); } catch (e) { }
        const userEmail = resetData.email || '';
        const userId = resetData.user_id || '';
        if (!userEmail) window.location.href = 'forgot-password.html';
        else document.getElementById('displayEmail').textContent = userEmail;

        function showToast(msg, type = 'default') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            const colors = { default: 'var(--gold)', error: '#e05454', success: '#54b066', warning: '#e09854' };
            t.style.borderTopColor = colors[type] || colors.default;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3500);
        }

        const inputs = Array.from(document.querySelectorAll('#otpGroup input'));
        inputs.forEach((input, i) => {
            input.addEventListener('keydown', e => {
                if (['Tab', 'ArrowLeft', 'ArrowRight'].includes(e.key) || e.ctrlKey || e.metaKey) return;
                if (e.key === 'Backspace') {
                    if (input.value === '' && i > 0) { inputs[i - 1].value = ''; inputs[i - 1].classList.remove('filled'); inputs[i - 1].focus(); }
                    else input.classList.remove('filled');
                    clearStatus(); return;
                }
                if (!/^\d$/.test(e.key)) { e.preventDefault(); setStatus('Numbers only (0–9)', 'warning'); return; }
                if (input.value.length >= 1) { e.preventDefault(); if (i < inputs.length - 1) inputs[i + 1].focus(); }
            });
            input.addEventListener('input', () => {
                input.value = input.value.replace(/\D/g, '').slice(0, 1);
                input.classList.toggle('filled', input.value !== '');
                inputs.forEach(inp => inp.classList.remove('error'));
                clearStatus();
                if (input.value && i < inputs.length - 1) inputs[i + 1].focus();
            });
            input.addEventListener('paste', e => {
                e.preventDefault();
                const digits = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
                digits.split('').forEach((d, idx) => { if (inputs[idx]) { inputs[idx].value = d; inputs[idx].classList.add('filled'); } });
                inputs[Math.min(digits.length, inputs.length - 1)].focus();
            });
        });

        function setStatus(msg, type = 'error') {
            const el = document.getElementById('statusMsg');
            el.textContent = msg; el.className = 'status ' + type;
        }
        function clearStatus() {
            const el = document.getElementById('statusMsg');
            el.className = 'status hidden'; el.textContent = '';
        }

        const CIRCUMFERENCE = 2 * Math.PI * 15.9;
        let timeLeft = 600, timerInterval;
        const ring = document.getElementById('timerRing');
        ring.style.strokeDasharray = CIRCUMFERENCE;

        function updateTimer() {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            const valEl = document.getElementById('timerVal');
            valEl.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - timeLeft / 600);
            ring.className = 'ring-fill'; valEl.className = 'timer-val';
            if (timeLeft <= 60) { ring.classList.add('low'); valEl.classList.add('low'); }
            if (timeLeft <= 30) { ring.classList.add('expired'); valEl.classList.add('expired'); }
            if (timeLeft <= 0) { clearInterval(timerInterval); document.getElementById('verifyBtn').disabled = true; setStatus('Code expired. Please request a new one.', 'error'); }
            timeLeft--;
        }
        function startCountdown() { clearInterval(timerInterval); timeLeft = 600; document.getElementById('verifyBtn').disabled = false; clearStatus(); updateTimer(); timerInterval = setInterval(updateTimer, 1000); }
        startCountdown();

        function startResendCooldown(secs = 30) {
            let cd = secs;
            const btn = document.getElementById('resendBtn');
            const cdEl = document.getElementById('resendCd');
            const secEl = document.getElementById('resendSec');
            btn.disabled = true; cdEl.style.display = '';
            const iv = setInterval(() => { cd--; secEl.textContent = cd; if (cd <= 0) { clearInterval(iv); btn.disabled = false; cdEl.style.display = 'none'; } }, 1000);
        }
        startResendCooldown();

        document.getElementById('resendBtn').addEventListener('click', async () => {
            document.getElementById('resendBtn').disabled = true;
            showToast('Sending a new code…');
            inputs.forEach(inp => { inp.value = ''; inp.classList.remove('filled', 'error', 'success'); });
            clearStatus();
            try {
                const res = await fetch('resend-otp.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: userEmail }) });
                const json = await res.json();
                if (json.success) { showToast('New code sent!', 'success'); startCountdown(); startResendCooldown(); inputs[0].focus(); }
                else { showToast(json.message || 'Failed to resend.', 'error'); document.getElementById('resendBtn').disabled = false; }
            } catch { showToast('Network error.', 'error'); document.getElementById('resendBtn').disabled = false; }
        });

        document.getElementById('verifyBtn').addEventListener('click', async () => {
            const code = inputs.map(i => i.value).join('');
            if (code.length < 6) { inputs.forEach(inp => inp.classList.add('error')); setStatus('Please enter the full 6-digit code.', 'error'); return; }
            const btn = document.getElementById('verifyBtn');
            btn.classList.add('loading'); btn.disabled = true; clearStatus();
            try {
                const res = await fetch('verify-otp.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: userEmail, otp: code, flow: 'forgot-password' }) });
                const json = await res.json();
                if (!json.success) { btn.classList.remove('loading'); btn.disabled = false; inputs.forEach(inp => inp.classList.add('error')); setStatus(json.message || 'Invalid code. Please try again.', 'error'); return; }
                clearInterval(timerInterval);
                inputs.forEach(inp => inp.classList.add('success'));
                showToast('Verified! Redirecting…', 'success');
                const returnedUserId = json.data?.user_id || userId;
                sessionStorage.setItem('reset_user', JSON.stringify({ email: userEmail, user_id: returnedUserId, verified: true, flow: 'forgot-password' }));
                setTimeout(() => { window.location.href = 'new-password.html'; }, 1200);
            } catch { btn.classList.remove('loading'); btn.disabled = false; setStatus('Network error. Please try again.', 'error'); }
        });
    </script>
</body>

</html>
